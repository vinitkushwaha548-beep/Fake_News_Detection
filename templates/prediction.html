<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your website description">
    <title>Fake News Detector</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                    },
                },
            },
        };
    </script>
</head>

<body>

<header class="text-gray-600 body-font -my-4">
    <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
        <a class="flex title-font font-medium items-center text-gray-900 mb-4 md:mb-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                class="w-10 h-10 text-white p-2 bg-indigo-500 rounded-full"
                viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <span class="ml-3 text-xl">Fake News Detection</span>
        </a>

        <nav class="md:ml-auto flex flex-wrap items-center text-base justify-center">
            <a class="mr-5 hover:text-gray-900">Home</a>
            <a class="mr-5 hover:text-gray-900">About Us</a>
            <a class="mr-5 hover:text-gray-900">Prediction</a>
            <a class="mr-5 hover:text-gray-900">Contact Us</a>
        </nav>
    </div>
</header>

<hr>

<section class="text-gray-600 body-font -my-8">
    <div class="container px-5 py-24 mx-auto">

        <div class="flex flex-col text-center w-full mb-20">
            <h2 class="text-xs text-indigo-500 tracking-widest font-medium title-font mb-1">
                Machine Learning Model
            </h2>

            <h1 class="sm:text-3xl text-2xl font-medium title-font mb-4 text-gray-900">
                Fake News Detection
            </h1>
        </div>

        <form action="/prediction" method="POST">

            <div class="mb-3">
                <label for="news" class="block mb-2 text-lg font-semibold">
                    Enter a news to verify
                </label>

                <input
                    type="text"
                    id="news"
                    name="news"
                    class="border border-gray-400 rounded-lg p-3 w-full"
                    placeholder="Enter the news headline..."
                    required
                >
            </div>

            <br>

            <button
                type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg">
                Submit
            </button>

        </form>

        <!-- Prediction Result -->
        {% if prediction_text %}
        <div class="mt-8 text-center">
            <h2 class="text-2xl font-bold text-blue-700">
                {{ prediction_text }}
            </h2>
        </div>
        {% endif %}

    </div>
</section>

<script>
    console.log("Page Loaded!");
</script>

</body>
</html>
